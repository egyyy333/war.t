name: Build Android Game APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1'

      - name: Ensure Environment Files Exist
        run: |
          if [ ! -f .env ]; then
            echo "Creating empty .env file from .env.example to prevent Secrets plugin from failing"
            cp .env.example .env
          fi

      - name: Decode or Recreate Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding debug.keystore from debug.keystore.base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "debug.keystore.base64 not found, generating a standard debug.keystore..."
            keytool -genkeypair -v \
              -keystore debug.keystore \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -alias androiddebugkey \
              -storepass android \
              -keypass android \
              -dname "CN=Android Debug, O=Android, C=US"
          fi

      - name: Create Signing Keystore if Missing
        run: |
          if [ ! -f "my-upload-key.jks" ]; then
            echo "Generating temporary signing keystore for release build"
            keytool -genkeypair -v \
              -keystore my-upload-key.jks \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -alias upload \
              -storepass defaultpass \
              -keypass defaultpass \
              -dname "CN=GameDev, OU=GameStudio, O=Studio, L=Cairo, S=Cairo, C=EG"
            
            # Set default password environment variables for the Gradle build
            echo "STORE_PASSWORD=defaultpass" >> $GITHUB_ENV
            echo "KEY_PASSWORD=defaultpass" >> $GITHUB_ENV
          else
            echo "Keystore already exists."
            # These can be configured in GitHub Secrets if the user wants custom signing
            echo "STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          fi

      - name: Regenerate Gradle Wrapper to prevent corruption
        run: |
          rm -f gradle/wrapper/gradle-wrapper.jar
          gradle wrapper --gradle-version 9.3.1

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Build Debug and Release APKs
        env:
          KEYSTORE_PATH: "${{ github.workspace }}/my-upload-key.jks"
        run: ./gradlew assembleDebug assembleRelease --no-daemon

      - name: Find and Organize Built APKs
        run: |
          mkdir -p build-apks
          # Copy debug APK
          find app/build/outputs/apk/debug/ -name "*.apk" -exec cp {} build-apks/trench-warfare-debug.apk \;
          # Copy release APK
          find app/build/outputs/apk/release/ -name "*.apk" -exec cp {} build-apks/trench-warfare-release.apk \;
          echo "Organized APKs in build-apks/"
          ls -la build-apks/

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: trench-warfare-debug-apk
          path: build-apks/trench-warfare-debug.apk

      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: trench-warfare-release-apk
          path: build-apks/trench-warfare-release.apk
